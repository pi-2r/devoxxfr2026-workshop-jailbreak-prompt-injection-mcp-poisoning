services:
  lab_benvii_com_caddy_gateway:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ~/.caddy/certs:/certs:ro
    restart: unless-stopped
    depends_on:
      - docker-registry
      - npm-registry

  docker-registry:
    image: registry:2
    volumes:
      - registry_data:/var/lib/registry
    restart: unless-stopped

  npm-registry:
    image: verdaccio/verdaccio:latest
    volumes:
      - npm_registry_data:/verdaccio/storage
    restart: unless-stopped

volumes:
  registry_data:
  npm_registry_data:

