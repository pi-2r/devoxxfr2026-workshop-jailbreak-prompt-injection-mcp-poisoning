version: '3.8'

services:
  mcp-codelab:
    build:
      context: .
      args:
        BASE_NODE_IMAGE: ${BASE_NODE_IMAGE:-node:22-slim}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: mcp_poisoning_lab
    ports:
      - "3000:3000"
    environment:
      # Remplacer cette valeur dans un fichier .env à la racine
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Modèle LLM (défaut: gpt-4o-mini — plus réaliste en production et plus vulnérable aux injections)
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    volumes:
      - .:/app
      - /app/node_modules
